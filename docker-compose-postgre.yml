services:
  db:
    image: postgres:16
    container_name: route_planner_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-route_planner}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - route_planner_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: route_planner_redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - route_planner_redis:/data

  adminer:
    image: adminer
    container_name: route_planner_viewer
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  route_planner_pg:
  route_planner_redis: